<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILIMNI — Progress Recovery</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; color: #222; }
  h1 { font-size: 1.3rem; }
  .card { border: 1px solid #ddd; border-radius: 10px; padding: 18px; margin: 16px 0; }
  label { display: block; font-weight: 600; font-size: .85rem; margin: 10px 0 4px; }
  input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
  button { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #2563eb; color: #fff; font-size: 1rem; font-weight: 600; margin-top: 14px; }
  button:disabled { background: #93b4f0; }
  #log { white-space: pre-wrap; font-family: monospace; font-size: .85rem; background: #f5f5f5; padding: 12px; border-radius: 8px; margin-top: 14px; min-height: 20px; }
  .ok { color: #16a34a; } .err { color: #dc2626; }
</style>
</head>
<body>
  <h1>ILIMNI — One-time Progress Recovery</h1>
  <p>This restores Jotham's reconstructed progress (898 XP, Missions 1 &amp; 2) into his Firestore account. Log in below with <strong>jothamkagah@gmail.com</strong>, then tap Restore.</p>

  <div class="card">
    <label for="email">Email</label>
    <input id="email" type="email" value="jothamkagah@gmail.com" autocomplete="email">
    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password">
    <button id="btn-login">Log in</button>
  </div>

  <div class="card">
    <button id="btn-restore" disabled>Restore progress</button>
    <div id="log"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
  <script>
    var logEl = document.getElementById("log");
    function log(msg, cls) {
      var line = document.createElement("div");
      if (cls) line.className = cls;
      line.textContent = msg;
      logEl.appendChild(line);
    }

    document.getElementById("btn-login").addEventListener("click", function () {
      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;
      firebaseAuth.signInWithEmailAndPassword(email, password)
        .then(function (cred) {
          log("Logged in as " + cred.user.email, "ok");
          document.getElementById("btn-restore").disabled = false;
        })
        .catch(function (err) {
          log("Login failed: " + err.message, "err");
        });
    });

    document.getElementById("btn-restore").addEventListener("click", function () {
      var btn = document.getElementById("btn-restore");
      btn.disabled = true;
      logEl.innerHTML = "";

      if (!firebaseAuth.currentUser) {
        log("Not signed in.", "err");
        btn.disabled = false;
        return;
      }
      if (firebaseAuth.currentUser.email !== "jothamkagah@gmail.com") {
        log("Signed in as " + firebaseAuth.currentUser.email + ", not jothamkagah@gmail.com. Aborting to be safe.", "err");
        btn.disabled = false;
        return;
      }

      // [id, correct(true/false/null=reflection), xp]
      var RECORDS = [
        ["m1-s1-01", true, 10], ["m1-s1-02", true, 15], ["m1-s1-03", false, 6], ["m1-s1-04", null, 10],
        ["m1-s2-01", true, 15], ["m1-s2-02", true, 15], ["m1-s2-03", true, 10], ["m1-s2-04", true, 15],
        ["m1-s2-05", true, 15], ["m1-s2-06", true, 10],
        ["m1-s3-01", true, 15], ["m1-s3-02", true, 15], ["m1-s3-03", true, 15], ["m1-s3-04", null, 10],
        ["m1-s4-01", true, 15], ["m1-s4-02", true, 15], ["m1-s4-03", true, 20], ["m1-s4-04", false, 6],
        ["m1-s4-05", true, 15], ["m1-s4-06", null, 10],
        ["m1-s5-01", true, 10], ["m1-s5-02", true, 15], ["m1-s5-03", true, 15], ["m1-s5-04", null, 10],
        ["m1-s6-01", true, 15], ["m1-s6-02", true, 15], ["m1-s6-03", true, 15], ["m1-s6-04", true, 20], ["m1-s6-05", null, 10],
        ["m1-s7-01", true, 15], ["m1-s7-02", true, 15], ["m1-s7-03", true, 15], ["m1-s7-04", true, 20], ["m1-s7-05", null, 10],
        ["m1-s8-01", true, 20], ["m1-s8-02", true, 20], ["m1-s8-03", true, 20], ["m1-s8-04", null, 15],
        ["m1-s9-01", true, 10], ["m1-s9-02", true, 20], ["m1-s9-03", null, 10],
        ["m1-reflect-01", null, 25],
        ["m2-os-01", true, 15], ["m2-os-02", true, 15], ["m2-os-03", true, 15], ["m2-os-04", null, 10],
        ["m2-bios-01", false, 6], ["m2-bios-02", true, 20],
        ["m2-cmos-01", true, 15],
        ["m2-desk-01", true, 15], ["m2-desk-02", true, 15], ["m2-desk-03", true, 15],
        ["m2-files-01", true, 20], ["m2-files-02", true, 20], ["m2-files-03", true, 20], ["m2-files-04", null, 10],
        ["m2-practical-01", true, 15],
        ["m2-practical-02", true, 20],
        ["m2-practical-03", true, 15],
        ["m2-practical-04", true, 15],
        ["m2-reflect-01", null, 25]
      ];

      var completedQuestions = {};
      var totalXp = 0;
      RECORDS.forEach(function (r) {
        completedQuestions[r[0]] = { correct: r[1], xp: r[2], skipped: false, answer: null };
        totalXp += r[2];
      });

      var reflectionAnswers = {
        "m1-s1-04": "A data is just raw text or number or anything without meaning. While information is meaningful data.\nAn example from my life: My daily spending, if it's not defined or reviewed, it would just be much data.",
        "m1-s3-04": "A computer is only limited by electricity.",
        "m1-s4-06": "SSD. No movable parts.",
        "m1-s5-04": "Incompletion.",
        "m1-s6-05": "Maybe that everything almost anything can be broken down if carefully followed. And that almost everything has building blocks.",
        "m1-s7-05": "Software problem. I could still access my phone, was just encrypted that I couldn't really use it.",
        "m1-s8-04": "WHat G7 means.",
        "m1-s9-03": "Maybe another time.",
        "m1-reflect-01": "Umm we'll try next time",
        "m2-os-04": "Blank screen.",
        "m2-files-04": "One is website address, the other is file type"
      };

      var recovered = {
        studentName: "Jotham",
        xp: totalXp,
        currentMission: 2,
        currentIndexByMission: { 1: 42, 2: 19 },
        completedQuestions: completedQuestions,
        reflectionAnswers: reflectionAnswers,
        missionProgress: {
          1: { started: true, completed: true },
          2: { started: true, completed: true }
        },
        theme: "light",
        earnedBadges: []
      };

      log("Reconstructed total XP: " + totalXp + " (should be 898)");

      window.firebaseDb.collection("students").doc(firebaseAuth.currentUser.uid).set(recovered)
        .then(function () {
          log("✅ Restored! Go back to the app and reload — Missions 1 & 2 should show complete with 898 XP.", "ok");
        })
        .catch(function (err) {
          log("❌ Write failed: " + err.message, "err");
          btn.disabled = false;
        });
    });
  </script>
</body>
</html>
